services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres 
  
    restart: always

    ports:
      - "5432:5432"
    volumes:
      - /var/lib/iot_unifier/postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: .
    ports:
      - "8000:8000"
      - "5000:5000"
    volumes:
      - /var/lib/iot_unifier:/var/lib/iot_unifier
    depends_on:
      db:
        condition: service_healthy
